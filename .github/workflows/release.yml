# Automated Release Workflow
# Uses semantic-release for automated versioning and changelog generation
#
# Satisfies (release-automation manifold):
# - B1: Version numbers follow semantic versioning
# - B2: Every release has a changelog
# - B3: Breaking changes increment MAJOR version
# - B4: Releases traceable to commits
# - T2: Version bump from commit types (fix→PATCH, feat→MINOR, BREAKING→MAJOR)
# - T4: Release artifacts match tagged version
# - T5: GitHub Action handles full release pipeline
# - S1: Secrets not exposed in logs
# - S2: Only GitHub Actions can create releases
# - O1: Fully automated release process
# - O2: Releases triggered on push to main only
# - O4: Manual trigger available via workflow_dispatch
#
# Satisfies (original constraints):
# - T1: CLI binaries for all 5 platforms (incl. Windows)
# - T2: Binaries attached to GitHub release
# - S2: Binaries built from tagged commit
# - O3: Release tag matches CLI version

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run semantic-release in dry-run mode'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Satisfies: RT-2, RT-3, RT-4 (version calculation, changelog, release)
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/github
            conventional-changelog-conventionalcommits
          dry_run: ${{ inputs.dry_run == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Bun version pin: 1.3.11 is the last version whose Linux→darwin
  # cross-compile embeds an ad-hoc linker-signed signature into the Mach-O
  # (flags=0x20002). Starting at 1.3.12, cross-compiled darwin binaries
  # are emitted unsigned, which macOS arm64 SIGKILLs on exec (exit 137 —
  # see v2.31.0 regression, fixed in v2.31.3). Building natively on
  # macos-latest instead is not a workable substitute: Bun 1.3.12+ writes
  # a partial signature section that `codesign --sign - --force` rejects
  # with "invalid or unsupported format for signature". Until Bun restores
  # clean toolchain-side signing, pin and cross-compile on Linux.
  #
  # The verify-darwin-arm64 job below is the regression canary that
  # converts any future silent toolchain drift into a CI failure.
  build:
    name: Build CLI Binaries
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        working-directory: cli
        run: bun install

      - name: Run tests
        working-directory: cli
        run: bun test

      - name: Build binaries for all platforms
        working-directory: cli
        run: |
          mkdir -p dist

          echo "Building darwin-arm64..."
          bun build ./index.ts --compile --target=bun-darwin-arm64 --outfile ./dist/manifold-darwin-arm64

          echo "Building darwin-x64..."
          bun build ./index.ts --compile --target=bun-darwin-x64 --outfile ./dist/manifold-darwin-x64

          echo "Building linux-x64..."
          bun build ./index.ts --compile --target=bun-linux-x64 --outfile ./dist/manifold-linux-x64

          echo "Building linux-arm64..."
          bun build ./index.ts --compile --target=bun-linux-arm64 --outfile ./dist/manifold-linux-arm64

          echo "Building windows-x64..."
          bun build ./index.ts --compile --target=bun-windows-x64 --outfile ./dist/manifold-windows-x64.exe

          echo "Build complete. Binary sizes:"
          ls -lh dist/

      - name: Report binary sizes
        working-directory: cli
        run: |
          echo "Binary sizes (bun compile bundles full runtime):"
          for binary in dist/manifold-*; do
            size=$(stat -c%s "$binary" 2>/dev/null || stat -f%z "$binary")
            size_mb=$((size / 1024 / 1024))
            echo "  $binary: ${size_mb}MB"
          done

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: cli/dist/manifold-*
          retention-days: 1

  release:
    name: Upload Release Assets
    needs: [semantic-release, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: binaries

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.semantic-release.outputs.new_release_git_tag }}
          files: binaries/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    name: Verify CLI Binary
    needs: [semantic-release, release]
    runs-on: ubuntu-latest
    # Don't fail the workflow if verification fails (assets may take time to propagate)
    continue-on-error: true

    steps:
      - name: Wait for release assets to propagate
        run: sleep 30

      - name: Download and test CLI binary
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_git_tag }}"
          BINARY_URL="https://github.com/dhanesh/manifold/releases/download/${VERSION}/manifold-linux-x64"

          echo "Downloading CLI from: $BINARY_URL"

          # Retry up to 3 times with 20 second delays
          for i in 1 2 3; do
            if curl -fsSL "$BINARY_URL" -o /tmp/manifold 2>/dev/null; then
              echo "Download successful on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done

          if [ ! -f /tmp/manifold ]; then
            echo "WARNING: Could not download CLI binary after 3 attempts"
            echo "This may be a timing issue - release assets can take time to propagate"
            echo "Please verify manually at: https://github.com/dhanesh/manifold/releases/tag/${VERSION}"
            exit 0
          fi

          chmod +x /tmp/manifold

          echo "Testing CLI..."
          /tmp/manifold --version
          /tmp/manifold --help

          echo "CLI binary verified successfully!"

  # Regression canary for the v2.31.0 SIGKILL issue: downloads the published
  # darwin-arm64 binary on a real Apple Silicon runner, asserts the ad-hoc
  # signature is present, and actually exec's the binary. The kernel
  # SIGKILLs unsigned arm64 Mach-O before main() runs, so a successful
  # --version here proves the release is installable by macOS arm64 users.
  #
  # continue-on-error is intentionally false — this is the sole automated
  # gate on darwin installability now that we rely on Bun's toolchain-side
  # signing. Download retries inside the job handle propagation timing so
  # blocking on actual signature failures is safe.
  verify-darwin-arm64:
    name: Verify macOS arm64 CLI Binary
    needs: [semantic-release, release]
    runs-on: macos-latest

    steps:
      - name: Wait for release assets to propagate
        run: sleep 30

      - name: Download and test darwin-arm64 binary
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_release_git_tag }}"
          BINARY_URL="https://github.com/dhanesh/manifold/releases/download/${VERSION}/manifold-darwin-arm64"

          echo "Downloading CLI from: $BINARY_URL"
          for i in 1 2 3; do
            if curl -fsSL "$BINARY_URL" -o /tmp/manifold 2>/dev/null; then
              echo "Download successful on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying in 20s..."
            sleep 20
          done

          if [ ! -f /tmp/manifold ]; then
            echo "WARNING: Could not download CLI binary after 3 attempts"
            exit 0
          fi

          chmod +x /tmp/manifold

          echo "Verifying code signature on published asset..."
          codesign -dv /tmp/manifold 2>&1 | tee /tmp/codesign.out
          if ! grep -q "Signature=adhoc" /tmp/codesign.out; then
            echo "::error::Published darwin-arm64 binary is NOT ad-hoc signed. macOS arm64 kernel will SIGKILL it (exit 137) on user machines."
            exit 1
          fi

          echo "Testing CLI execution..."
          /tmp/manifold --version
          /tmp/manifold --help

          echo "macOS arm64 CLI binary verified successfully!"

  verify-windows:
    name: Verify Windows CLI Binary
    needs: [semantic-release, release]
    runs-on: windows-latest
    # Satisfies: T9 (Windows binary), G2 (Windows testing via CI runner)
    continue-on-error: true

    steps:
      - name: Wait for release assets to propagate
        run: Start-Sleep -Seconds 30

      - name: Download and test Windows CLI binary
        shell: pwsh
        run: |
          $VERSION = "${{ needs.semantic-release.outputs.new_release_git_tag }}"
          $BINARY_URL = "https://github.com/dhanesh/manifold/releases/download/${VERSION}/manifold-windows-x64.exe"
          $DEST = "$env:TEMP\manifold.exe"

          Write-Host "Downloading CLI from: $BINARY_URL"

          $maxRetries = 3
          $downloaded = $false
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Invoke-WebRequest -Uri $BINARY_URL -OutFile $DEST -UseBasicParsing -TimeoutSec 60
              Write-Host "Download successful on attempt $i"
              $downloaded = $true
              break
            } catch {
              Write-Host "Attempt $i failed: $_"
              if ($i -lt $maxRetries) {
                Write-Host "Retrying in 20s..."
                Start-Sleep -Seconds 20
              }
            }
          }

          if (-not $downloaded) {
            Write-Host "WARNING: Could not download Windows CLI binary after $maxRetries attempts"
            Write-Host "This may be a timing issue - release assets can take time to propagate"
            Write-Host "Please verify manually at: https://github.com/dhanesh/manifold/releases/tag/${VERSION}"
            exit 0
          }

          Write-Host "Testing CLI..."
          & $DEST --version
          if ($LASTEXITCODE -ne 0) { Write-Error "Version check failed"; exit 1 }

          & $DEST --help
          if ($LASTEXITCODE -ne 0) { Write-Error "Help check failed"; exit 1 }

          & $DEST hook --help
          if ($LASTEXITCODE -ne 0) { Write-Error "Hook subcommand check failed"; exit 1 }

          Write-Host "Windows CLI binary verified successfully!"

      - name: Test install-cli.ps1 syntax
        shell: pwsh
        run: |
          # Verify the PowerShell install script parses without errors
          # We can't fully test download (no release URL for this commit) but
          # we can validate the script syntax and function definitions
          $scriptUrl = "https://raw.githubusercontent.com/dhanesh/manifold/main/plugin/bin/install-cli.ps1"
          try {
            $script = Invoke-WebRequest -Uri $scriptUrl -UseBasicParsing -TimeoutSec 30
            $null = [System.Management.Automation.PSParser]::Tokenize($script.Content, [ref]$null)
            Write-Host "install-cli.ps1 syntax validation passed"
          } catch {
            Write-Host "WARNING: Could not validate install-cli.ps1 syntax: $_"
            Write-Host "This is non-blocking - script may not be published to main yet"
          }
