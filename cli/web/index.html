<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="manifold-version" content="dev" />
    <meta name="color-scheme" content="dark light" />
    <title>Manifold Visualiser</title>
    <script>
      // FOUC guard: pick the right colour-scheme attribute before the
      // bundle parses, using the persisted theme choice + system fallback.
      (function () {
        try {
          var stored = localStorage.getItem('manifold-theme') || 'system';
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var appearance =
            stored === 'apple-light' ? 'light' :
            stored === 'apple-dark' ? 'dark' :
            stored === 'nord' ? 'dark' :
            (prefersDark ? 'dark' : 'light');
          document.documentElement.dataset.themeName = stored;
          document.documentElement.dataset.themeAppearance = appearance;
          document.documentElement.style.background =
            appearance === 'dark' ? '#1c1c1e' : '#f2f2f7';
          document.documentElement.style.color =
            appearance === 'dark' ? '#f5f5f7' : '#1d1d1f';
        } catch (e) { /* noop */ }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
