# Golden-file regression fixture: reduce-context-rot
#
# Drives the m0->m5 workflow and asserts the resulting signature matches the
# recorded golden within tolerance. Bootstrap baseline is the existing verified
# .manifold/reduce-context-rot.* files (produced by Opus 4.7).
#
# Tolerance bands calibrated from three full regenerations (2026-04-17):
#   Run 1: VERIFIED, constraints=16, tensions=6, RTs_total=14, artifacts=22
#   Run 2: GENERATED (with blockers), constraints=14, tensions=6, RTs_total=23, artifacts=20
#   Run 3: GENERATED (rate-capped before m5), constraints=14, tensions=8, RTs_total=13, artifacts=28
# Headline variances: RTs_total ∈ [13, 23], artifacts_total ∈ [20, 28].

feature: reduce-context-rot

outcome: >
  Zero context rot and token optimization as a first-class feature across the
  entire m0-m6 workflow. Every phase reads manifold state from disk, output is
  maximally visual, and cross-phase information transfer uses file references
  rather than inline repetition.

# Keywords that MUST appear in the markdown output. These are constraint-level
# invariants of the fixture — if the model fails to surface them, the run is a
# regression regardless of other dimensions. Lower-cased substring match.
#
# Note (2026-04-17): Prior version listed hand-curated phrases ("400 lines",
# "phase-commons", "smart delta") that Opus-regenerated runs never produced.
# Switched to keywords that derive from the outcome statement and the core
# workflow, so any faithful regeneration will hit them.
must_have_keywords:
  - "context"
  - "token"
  - "manifold"
  - "phase"

# Dimension-specific tolerance overrides. Keys are dotted paths into the Signature.
# If a dimension is not listed, it uses the default tolerance defined in compare.ts.
#
# Tolerance kinds:
#   exact       — value must equal golden
#   range       — numeric, within [min, max]
#   ratio       — numeric, within golden * [1-r, 1+r]
#   superset    — set of strings, must include all golden entries
#   bool_exact  — boolean, must equal golden
tolerance:
  # Phase + convergence are contract — any drift is a regression.
  phase: exact
  convergence_status: exact
  schema_version: exact
  domain: exact

  # Anchor structure is a strong quality signal; require the binding constraint
  # and recommended option every time.
  anchors.binding_constraint_present: bool_exact
  anchors.recommended_option_present: bool_exact

  # Constraint count — Opus varies 14-16 across runs. Widen ratio.
  constraints.total: { kind: range, min: 12, max: 20 }
  constraints.by_category.business: { kind: range, min: 1, max: 5 }
  constraints.by_category.technical: { kind: range, min: 3, max: 9 }
  constraints.by_category.user_experience: { kind: range, min: 1, max: 6 }
  constraints.by_category.security: { kind: range, min: 0, max: 4 }
  constraints.by_category.operational: { kind: range, min: 1, max: 5 }

  # Must have at least one invariant — the feature has safety-critical constraints.
  # Observed 6-10 across runs.
  constraints.by_type.invariant: { kind: range, min: 3, max: 14 }
  # Observed 1-4; boundaries vary with recursive decomposition.
  constraints.by_type.boundary: { kind: range, min: 1, max: 6 }

  # Tensions: observed 6-8 across runs; resolution should be near-total.
  tensions.total: { kind: range, min: 4, max: 12 }
  tensions.resolved: { kind: range, min: 4 }

  # Anchors: root RTs vary widely with recursive decomposition (observed 8-13).
  # Total RTs including children observed 13-23 — recursion depth is non-deterministic.
  anchors.required_truths_root: { kind: range, min: 6, max: 16 }
  anchors.required_truths_total: { kind: range, min: 10, max: 28 }
  # Recursive decomposition is optional — Run 3 had 0 children.
  anchors.required_truths_with_children: { kind: range, min: 0 }

  # Evidence: totals vary 29-44 across runs; do not assume all VERIFIED (partial
  # verification may leave many PENDING).
  evidence.total: { kind: range, min: 20, max: 60 }

  # Generation: full coverage only applies when phase=VERIFIED. Rate-capped or
  # partial runs may end at GENERATED with lower coverage numbers.
  generation.coverage_pct: { kind: range, min: 80, max: 100 }
  # Observed 20-28 across runs — widen the old 6-15 band that was based on the
  # hand-curated golden (m4 generates more artifacts than hand-curated manifolds).
  generation.artifacts_total: { kind: range, min: 15, max: 35 }

  # Iterations: m0-m5 = 5 phase iterations minimum; may increase if phases re-run.
  iterations.total: { kind: range, min: 3, max: 8 }

  # Markdown presence is contract.
  markdown.has_outcome: bool_exact
  markdown.has_constraints: bool_exact
  markdown.has_tensions: bool_exact
  markdown.has_required_truths: bool_exact

  # Line count varies with RT count and artifact count (observed 478-601).
  markdown.line_count: { kind: range, min: 400, max: 700 }
