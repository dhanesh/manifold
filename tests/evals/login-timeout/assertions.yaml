# Login Timeout — Eval Assertions
# Simple feature: single-category, m-quick appropriate

phases:
  m-quick:
    assertions:
      - type: schema_valid
      - type: scope_guard
      - type: constraint_count_min
        min: 1
      - type: constraint_count_max
        max: 3
        description: Light mode should discover 1-3 constraints
      - type: security_detection_skip
        description: login-timeout contains login which MAY trigger security detection — verify gate fires and user can override
